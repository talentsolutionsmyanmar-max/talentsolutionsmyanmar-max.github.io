<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReferTRM Portal — Workforce Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="sideBrand">Refer<b>TRM</b></div>
    <div class="sideEnv">Client Portal · Premium Retail (Makro)</div>
    <nav class="sideNav" id="sideNav">
      <a class="snI" href="#/today" data-r="today"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg><span>Today</span></a>
      <a class="snI" href="#/roster" data-r="roster"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Workforce</span><span class="n" id="navCount">125</span></a>
      <a class="snI" href="#/cycle" data-r="cycle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Performance</span></a>
    </nav>
    <div class="sideFoot">
      <div class="sideUser">
        <span class="avatar">TH</span>
        <div><div class="nm">Thiri Htun</div><div class="rl">HR Business Partner</div></div>
      </div>
    </div>
  </aside>
  <div class="main">
    <header class="top">
      <span class="topCrumb" id="topCrumb">PORTAL / <b>TODAY</b></span>
      <div class="topSearch"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="globalSearch" placeholder="Search people, departments, scores…"></div>
      <div style="flex:1"></div>
      <button class="iconBtn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">
        <svg id="themeIco" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </header>
    <main class="content">
      <section class="screen" id="scr-today"></section>
      <section class="screen" id="scr-roster"></section>
      <section class="screen" id="scr-person"></section>
      <section class="screen" id="scr-cycle"></section>
    </main>
  </div>
</div>
<script src="app.js"></script>

</html>
