/* theme first-paint: saved choice wins; else follow the real sky */
try{
  var t = localStorage.getItem('ydc-canvas-theme');
  if(!t){ var h = new Date().getHours(); t = (h >= 7 && h < 18) ? 'day' : 'night'; }
  document.documentElement.setAttribute('data-theme', t);
}catch(e){}
</script>
