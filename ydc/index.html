<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>YDC — Youth Development Center</title>
<meta name="description" content="Youth Development Center — learner demo surface. Seeded invented data.">
<link rel="stylesheet" href="styles.css">
<script>
/* Theme boot before first paint — no flash */
(function(){try{
  var t = localStorage.getItem('ydc-theme');
  if(!t){ t = 'dark'; }
  document.documentElement.setAttribute('data-theme', t);
}catch(e){ document.documentElement.setAttribute('data-theme','dark'); }})();
</script>
</head>
<body>
<div id="app" class="app"><!-- rendered by app.js --></div>
<noscript>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0B0E1A;color:#C9D4E8;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;padding:32px">
    <div style="max-width:520px">
      <p style="font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#E3C35B;margin:0 0 18px">YDC · Youth Development Center</p>
      <h1 style="font-size:32px;line-height:1.15;letter-spacing:-.02em;margin:0 0 16px;color:#F4F0E4">Learn by doing.</h1>
      <p style="font-size:15px;line-height:1.8;margin:0 0 14px">A place for young people to build real skills — masteries you can prove, gates you can see before they're reachable, wonders that cost nothing.</p>
      <p style="font-size:14px;line-height:1.8;margin:0 0 22px">Walk the <a style="color:#E3C35B" href="../ydc-canvas/">Night Trail</a> · begin at the <a style="color:#E3C35B" href="../intent-hub/">ReferTRM hub</a> · learn in the <a style="color:#E3C35B" href="https://www.refertrm.com/eq/academy">Academy</a>.</p>
      <p style="font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7E8CA6;border-top:1px solid rgba(201,212,232,.18);padding-top:16px;margin:0">The path is still here. The world needs JavaScript to open.</p>
    </div>
  </div>
</noscript>
<script src="app.js"></script>
</body>
</html>
